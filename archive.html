<!-- Deepseek AI 生成 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全部存档 · 每日心理胶囊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f8f6f2;
            color: #2d2d2d;
            line-height: 1.8;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .badge {
            display: inline-block;
            background: #e8e0d5;
            color: #5a4e3e;
            font-size: 13px;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin: 8px 0 4px;
        }

        .subtitle {
            color: #b8a99a;
            font-size: 15px;
            margin-bottom: 28px;
        }

        .back-link {
            display: inline-block;
            color: #7a9bb5;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        /* 统计信息 */
        .stats {
            background: #f5f0eb;
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 28px;
            font-size: 14px;
            color: #5a4e3e;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stats span {
            font-weight: 600;
            color: #3a2f25;
        }

        /* 时间线 */
        .timeline {
            position: relative;
            padding-left: 28px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 4px;
            bottom: 0;
            width: 2px;
            background: #e0d8ce;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 20px;
            padding: 16px 20px;
            background: #faf8f5;
            border-radius: 12px;
            transition: background 0.2s;
            border: 1px solid #f0ebe5;
        }

        .timeline-item:hover {
            background: #f5f0eb;
            border-color: #d5cdc0;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -22px;
            top: 22px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #c4b5a5;
            border: 2px solid white;
            box-shadow: 0 0 0 2px #c4b5a5;
        }

        .timeline-item .date {
            font-size: 13px;
            color: #b8a99a;
            letter-spacing: 0.5px;
        }

        .timeline-item .concept-name {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 4px 0 6px;
        }

        .timeline-item .concept-name a {
            color: #1a1a1a;
            text-decoration: none;
        }
        .timeline-item .concept-name a:hover {
            color: #7a9bb5;
        }

        .timeline-item .preview {
            font-size: 14px;
            color: #7a7a7a;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
        }

        /* 标签（概念分类，可选） */
        .tag {
            display: inline-block;
            background: #e8e0d5;
            color: #5a4e3e;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 12px;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        /* 空状态 */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #b8a99a;
        }
        .empty .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }

        /* 页脚 */
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #bbb;
            text-align: center;
        }
        .footer a {
            color: #b8a99a;
            text-decoration: none;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 28px 16px;
            }
            h1 {
                font-size: 22px;
            }
            .timeline {
                padding-left: 20px;
            }
            .timeline-item {
                padding: 14px 16px;
            }
            .timeline-item .concept-name {
                font-size: 16px;
            }
            .stats {
                flex-direction: column;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航 -->
        <a href="../" class="back-link">← 返回今日胶囊</a>

        <!-- 头部 -->
        <div class="header">
            <div>
                <div class="badge">📚 全部存档</div>
                <h1>每日心理胶囊 · 档案馆</h1>
                <div class="subtitle">每一天，一颗心理学概念</div>
            </div>
        </div>

        <!-- 统计 -->
        <div class="stats">
            <span>📖 共 <span id="totalCount">0</span> 颗胶囊</span>
            <span>📅 从 <span id="firstDate">--</span> 开始</span>
        </div>

        <!-- 时间线 -->
        <div class="timeline" id="timeline">
            <!-- 由 JavaScript 动态生成 -->
        </div>

        <div class="footer">
            每日自动更新 · 用 AI 生成
        </div>
    </div>

    <script>
        (function() {
            // 已知的 archives 目录路径（相对于当前页面）
            const ARCHIVES_PATH = 'archives/';

            // 获取所有 HTML 文件列表（通过 fetch 获取目录索引）
            // 注意：GitHub Pages 默认不会自动生成目录索引，
            // 所以需要提前在 archives/ 目录下放一个 index.json 或使用其他方式。
            // 这里提供两种方案：

            // ============================================================
            // 方案 A：使用预生成的 index.json（推荐）
            // ============================================================
            // 在 GitHub Actions 生成脚本中，同时生成一个 archives/index.json
            // 包含所有文件的元数据，然后前端 fetch 这个 JSON。
            // 这是最可靠的方式。

            // ============================================================
            // 方案 B：硬编码文件列表（备选）
            // ============================================================
            // 如果无法生成 index.json，可以在生成脚本中直接更新这个页面，
            // 把文件列表写进 JavaScript 的 CONCEPT_LIST 数组。
            // 以下为示例数据，实际会被生成脚本替换。

            // 这个变量将由 generate.py 在生成时自动更新
            var CONCEPT_LIST = [
                // { date: '2026-07-21', concept: '控制幻觉', file: '2026-07-21.html' },
                // { date: '2026-07-22', concept: '习得性无助', file: '2026-07-22.html' },
                // { date: '2026-07-23', concept: '认知失调', file: '2026-07-23.html' },
            ];

            // ============================================================
            // 方案 C：动态探测（尝试 fetch 文件列表，仅支持部分托管服务）
            // ============================================================
            // 对于 GitHub Pages，可以尝试通过 fetch 获取 archives/ 目录的
            // 文件列表（但通常会被 403 禁止），所以不推荐。

            function renderArchives(concepts) {
                const timeline = document.getElementById('timeline');
                const totalCount = document.getElementById('totalCount');
                const firstDate = document.getElementById('firstDate');

                if (!concepts || concepts.length === 0) {
                    timeline.innerHTML = `
                        <div class="empty">
                            <span class="emoji">📭</span>
                            <p>还没有存档，<br>明天会有一颗新的心理胶囊 🧠</p>
                        </div>
                    `;
                    totalCount.textContent = '0';
                    firstDate.textContent = '--';
                    return;
                }

                // 按日期倒序排列（最新的在前）
                const sorted = [...concepts].sort((a, b) => {
                    if (a.date > b.date) return -1;
                    if (a.date < b.date) return 1;
                    return 0;
                });

                totalCount.textContent = sorted.length;
                firstDate.textContent = sorted[sorted.length - 1].date;

                let html = '';
                sorted.forEach(item => {
                    const displayDate = item.date || '?';
                    // 预览截取概念名称作为预览
                    const previewText = item.concept || '未知概念';
                    
                    html += `
                        <div class="timeline-item">
                            <div class="date">${displayDate}</div>
                            <div class="concept-name">
                                🧠 ${previewText}
                            </div>
                            <div class="preview">
                                <a href="${item.file}" target="_blank">
                                    跳转文件 : ${item.file}
                                </a>    
                            </div>
                            <span class="tag"># 心理学</span>
                        </div>
                    `;
                });

                timeline.innerHTML = html;
            }

            // ============================================================
            // 加载数据：优先 fetch index.json，失败则用 CONCEPT_LIST
            // ============================================================

            function loadFromIndexJson() {
                return fetch(ARCHIVES_PATH + 'index.json')
                    .then(res => {
                        if (!res.ok) throw new Error('index.json not found');
                        return res.json();
                    })
                    .then(data => {
                        renderArchives(data);
                    })
                    .catch(() => {
                        // 如果 fetch index.json 失败，使用硬编码列表
                        if (CONCEPT_LIST && CONCEPT_LIST.length > 0) {
                            renderArchives(CONCEPT_LIST);
                        } else {
                            // 如果列表为空，尝试从已有的 HTML 文件名推断（备选方案）
                            loadFromHardcodedFallback();
                        }
                    });
            }

            // 备选：如果 CONCEPT_LIST 为空，提供示例说明
            function loadFromHardcodedFallback() {
                const timeline = document.getElementById('timeline');
                timeline.innerHTML = `
                    <div class="empty">
                        <span class="emoji">🔧</span>
                        <p><strong>正在准备档案...</strong></p>
                        <p style="font-size:14px; margin-top:8px;">
                            首次运行后，这里会自动显示所有历史概念。<br>
                            请确保 <code>archives/index.json</code> 存在，<br>
                            或在生成脚本中更新 <code>CONCEPT_LIST</code>。
                        </p>
                    </div>
                `;
            }

            // 启动
            loadFromIndexJson();

        })();
    </script>
</body>
</html>
